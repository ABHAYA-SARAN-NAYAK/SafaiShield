# Render Blueprint for SafaiShield Deployment
services:
  # 1. FastAPI Backend Web Service
  - type: web
    name: safaishield-backend
    env: python
    rootDir: safaishield-backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "*"

  # 2. React Vite Frontend Static Site
  - type: web
    name: safaishield-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: safaishield-backend
          property: url
